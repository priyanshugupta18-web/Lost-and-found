<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<header class="top-nav">
    <div class="brand">Lost & Found</div>

    <div class="user-profile" id="profileArea">
        <span id="userNameDisplay">User</span>
        <div class="avatar" id="userAvatar">U</div>

        <div class="profile-dropdown" id="dropdown">
            <button id="logoutBtn">Logout</button>
        </div>
    </div>
</header>

<main class="dash-content">

    <div class="welcome-banner">
        <h1 id="welcomeGreeting">Hi, User 👋</h1>
        <p id="statusMessage">Welcome back!</p>
    </div>

    <div class="main-actions">
        <div class="action-row" onclick="location.href='listings.html'">
            <div>
                <h3>View Listings</h3>
                <p>Browse all lost & found items</p>
            </div>
            <div class="action-icon">🔍</div>
        </div>

        <div class="action-row highlight" onclick="location.href='post-item.html'">
            <div>
                <h3>Post Item</h3>
                <p>Report a lost or found item</p>
            </div>
            <div class="action-icon">＋</div>
        </div>
    </div>

</main>

<script type="module" src="../dashboard/dashboard.js"></script>

</body>
</html>
