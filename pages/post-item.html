<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>post-item</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/post-item.css">
</head>

<body>
    <div class="container">
        <form action="">
            <h2 id="form-title">Report Item</h2>
            <div>
                <label for="item-name">Enter name of the item:</label>
                <input type="text" name="item-name" placeholder="Item name here" required>
            </div>
            <div>
                <label for="Description">Description:</label>
                <textarea name="Description" id="Description" placeholder="write something..." required></textarea>
            </div>
            <div>
                <label for="image">Upload Image:</label>
                <input type="file" id="image" accept="image/*">
            </div>
            <div>
                <label for="phone-number">Enter your mobile number:</label>
                <input type="tel" id="phone" name="phone-number" required>
            </div>
            <div>
                <label for="type">Type:</label>
                <select name="type">
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                </select>
            </div>
            <button class="rpt-btn">Report</button>
        </form>
    </div>
    <script type="module" src="../js/post-item.js"></script>
</body>

</html>
