<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt - Report Item</title>
    <link rel="icon" type="image/png" href="../assets/favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/post-item.css">
</head>

<body>
    <div class="container">
        <form action="">
            <a class="brand" href="../index.html" aria-label="FindIt home">
                <span class="brand-mark">F</span>
                <span>FindIt</span>
            </a>
            <h2 id="form-title">Report an item</h2>
            <p class="form-subtitle">Add the details people need to identify and return it.</p>
            <div>
                <label for="item-name">Item name</label>
                <input type="text" name="item-name" placeholder="Blue backpack" required>
            </div>
            <div>
                <label for="Description">Description</label>
                <textarea name="Description" id="Description" placeholder="Add color, location, time, or identifying details" required></textarea>
            </div>
            <div>
                <label for="image">Upload image</label>
                <input type="file" id="image" accept="image/*">
            </div>
            <div>
                <label for="phone-number">Mobile number</label>
                <input type="tel" id="phone" name="phone-number" required>
            </div>
            <div>
                <label for="type">Report type</label>
                <select name="type">
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                </select>
            </div>
            <button type="submit" class="rpt-btn">Report</button>
        </form>
    </div>
    <script type="module" src="../js/post-item.js"></script>
</body>

</html>
