<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/auth.css" />
    <title>FindIt - Login / Sign Up</title>
    <link rel="icon" type="image/png" href="../assets/favicon.svg">
  </head>

  <body>
    <div class="container">
      <a class="brand" href="../index.html" aria-label="FindIt home">
        <span class="brand-mark">F</span>
        <span>FindIt</span>
      </a>
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to post, search, and manage FindIt reports.</p>
      <div class="inputs">
        <input type="email" placeholder="Enter your email" id="email" />
        <input
          type="password"
          placeholder="Enter your password"
          id="password"
        />
      </div>
      <div class="btn">
        <button type="button" id="login">Login</button>
        <button type="button" id="signup">Sign Up</button>
      </div>

      <div class="divider"><span>OR</span></div>

      <button type="button" id="googleBtn" class="google-btn">
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google icon"
        />
        Continue with Google
      </button>
    </div>
    <script type="module" src="../auth/auth.js"></script>
  </body>
</html>
