<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FindIt - Listings</title>
  <link rel="icon" type="image/png" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../css/listings.css">
</head>

<body>
  <div class="container">
    <a class="brand" href="../index.html" aria-label="FindIt home">
      <span class="brand-mark">F</span>
      <span>FindIt</span>
    </a>
    <p class="eyebrow">Latest campus reports</p>
    <h2 class="title">FindIt Listings</h2>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search item name, type, or details..." />
      <button id="searchBtn">Search</button>
    </div>

    <p id="message" class="message">
      Search for an item above or browse the latest reports.
    </p>

    <div id="items" class="grid"></div>
  </div>

  <script type="module" src="../js/listings.js"></script>
</body>
</html>
