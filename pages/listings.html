<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Listings</title>
  <link rel="stylesheet" href="../css/listings.css">
</head>

<body>
  <div class="container">
    <h2 class="title">Lost & Found Items</h2>

    <!-- 🔍 Search Bar -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search item name..." />
      <button id="searchBtn">Search</button>
    </div>

    <!-- 📝 Default Message -->
    <p id="message" class="message">
      Search for a lost or found item above 👆
    </p>

    <!-- 📦 Results -->
    <div id="items" class="grid"></div>
  </div>

  <script type="module" src="../js/listings.js"></script>
</body>
</html>
